{% extends "core/base.html" %}
{% block title %}Login - Biblioteca{% endblock %}
{% block content %}
<div class="card" style="max-width:420px;margin:3rem auto">
  <h1 style="margin-bottom:1rem">Acesso ao sistema</h1>
  {% if form.errors %}<p style="color:#a33;margin-bottom:1rem">Usuário ou senha inválidos.</p>{% endif %}
  <form method="post">
    {% csrf_token %}
    <p><label for="id_username">Usuário</label>{{ form.username }}</p>
    <p><label for="id_password">Senha</label>{{ form.password }}</p>
    <button class="btn" type="submit">Entrar</button>
  </form>
</div>
{% endblock %}

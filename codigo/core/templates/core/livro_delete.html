{% extends "core/base.html" %}
{% block title %}Excluir livro - Biblioteca{% endblock %}
{% block content %}
<div class="card" style="max-width:520px">
  <h1 style="margin-bottom:1rem">Excluir livro</h1>
  <p style="margin-bottom:1rem">Confirma a exclusão de <strong>{{ livro.titulo }}</strong>?</p>
  <form method="post">
    {% csrf_token %}
    <button class="btn danger" type="submit">Excluir</button>
    <a class="btn secondary" href="{% url 'livro_list' %}">Cancelar</a>
  </form>
</div>
{% endblock %}
